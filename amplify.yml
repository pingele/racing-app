version: 1
backend:
  phases:
    build:
      commands:
        - 'echo "AWS_BRANCH=$AWS_BRANCH AWS_APP_ID=$AWS_APP_ID"'
        - 'test -n "$AWS_BRANCH" || { echo "ERROR: AWS_BRANCH is empty"; exit 1; }'
        - 'test -n "$AWS_APP_ID" || { echo "ERROR: AWS_APP_ID is empty"; exit 1; }'
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
        - 'npx ampx pipeline-deploy --debug --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID"'
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
        - export NODE_OPTIONS="--max-old-space-size=14000"
        - export GENERATE_SOURCEMAP=false
        - npm --prefix client install --cache .npm --prefer-offline --no-audit --no-fund
    build:
      commands:
        - npm --prefix client run build
  artifacts:
    baseDirectory: client/dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - client/node_modules/**/*
