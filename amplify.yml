version: 1
backend:
  phases:
    build:
      commands:
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
        - npm --prefix client install --cache .npm --prefer-offline --no-audit --no-fund
    build:
      commands:
        - npm --prefix client run build
  artifacts:
    baseDirectory: client/dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - client/node_modules/**/*
